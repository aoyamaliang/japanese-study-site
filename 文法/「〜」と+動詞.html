<h2>「〜」と+動詞</h2>
<p><strong>接續</strong>:「引用內容」+ と + 言う/答える/話す/思う 等</p>
<p><strong>意思</strong>:引用某人說的話或想法</p>
<h3>例句</h3>
<ul><li>「前より仕事がうまくできるようになった」<strong>と</strong>答えました。</li><li>専門家は「〜でしょう」<strong>と</strong>話しています。</li></ul>
