<h2>〜そうだ(傳聞)</h2>
<p><strong>接續</strong>:普通形 + そうだ</p>
<p><strong>意思</strong>:「聽說〜」,轉述從別處得到的資訊</p>
<h3>例句</h3>
<ul><li>休みの日に勉強する人が多い<strong>そうです</strong>。</li></ul>
<h3>注意</h3>
<ul><li>⚠️ 和「樣態そうだ」(ます形去ます+そうだ,「看起來〜」)完全不同:</li><li>雨が降る<strong>そうだ</strong>(聽說會下雨)← 傳聞</li><li>雨が降り<strong>そうだ</strong>(看起來快下雨了)← 樣態</li><li>常和 <a href="../文法/〜によると.html">〜によると</a> 搭配使用</li></ul>
