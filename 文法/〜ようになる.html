</head>
<body>
<header class="site"><a href="../index.html">🏠 日文讀書會</a><button type="button" id="furi-toggle">あ 假名:開</button></header>
<main>
<h2>〜ようになる</h2>
<p><strong>接續</strong>:動詞辭書形/ない形 + ようになる</p>
<p><strong>意思</strong>:表示能力、習慣或狀態的變化 →「變得(能夠)〜」</p>
<h3>例句</h3>
<ul><li>日本語が話せる<strong>ようになりました</strong>。(變得會說日語了)</li><li>毎朝走る<strong>ようになった</strong>。(養成了每天早上跑步的習慣)</li></ul>
<h3>注意</h3>
<ul><li>和 <span class="deadlink" title="尚未建立筆記">〜ことになる</span> 區別:「ようになる」是自然/能力的變化,「ことになる」是決定的結果</li><li>否定變化常用「〜なくなる」而不是「〜ないようになる」</li></ul>
<h3>出現過的文章</h3>

<footer>更新:2026-07-20</footer>
</main>
<script>
(function(){
  var KEY = 'furigana-off';
  var btn = document.getElementById('furi-toggle');
  function apply(){
    var off = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('no-furigana', off);
    if (btn) btn.textContent = off ? 'あ 假名:關' : 'あ 假名:開';
  }
  if (btn) btn.onclick = function(){
    localStorage.setItem(KEY, localStorage.getItem(KEY) === '1' ? '0' : '1');
    apply();
  };
  apply();
})();
</script>
</body>
</html>
