<h2>〜たり〜たりする</h2>
<p><strong>接續</strong>:動詞た形 + り</p>
<p><strong>意思</strong>:列舉代表性的動作(暗示還有其他)→「又〜又〜、有時〜有時〜」</p>
<h3>例句</h3>
<ul><li>休みの日に、勉強をし<strong>たり</strong>、家族と過ごし<strong>たり</strong>する。</li></ul>
<h3>注意</h3>
<ul><li>句尾的「する」要依時態變化:したりします/したりした</li><li>只列一項也可以:「休みの日は寝たりしています」</li></ul>
