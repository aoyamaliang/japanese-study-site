<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>〜前に</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site"><a href="../index.html">🏠 日文讀書會</a><button type="button" id="furi-toggle">あ 假名:開</button></header>
<main>
<h2>〜前に</h2>
<p><strong>接續</strong>:動詞辭書形 + 前に/名詞 + の前に</p>
<p><strong>意思</strong>:「在〜之前」。⚠️ 不管句子時態是過去還是未來,前に前面<strong>永遠用辭書形</strong></p>
<h3>例句</h3>
<ul><li>受付が始まる<strong>前に</strong>、およそ１００人が列を作りました。</li><li>寝る<strong>前に</strong>、歯を磨きます。(睡前刷牙)</li><li>食事<strong>の前に</strong>、手を洗います。</li></ul>
<h3>注意</h3>
<ul><li>相反詞是「〜たあとで」(〜之後),但後面接<strong>た形</strong>:食べた<strong>あとで</strong></li><li>這組「前に=辭書形/あとで=た形」是 N5 考試常客</li></ul>
<h3>出現過的文章</h3>
<ul><li><a href="../教材/2026-07-13 桃の食べ放題イベント.html">2026-07-13 桃の食べ放題イベント</a></li></ul>
<footer>更新:2026-07-20</footer>
</main>
<script>
(function(){
  var KEY = 'furigana-off';
  var btn = document.getElementById('furi-toggle');
  function apply(){
    var off = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('no-furigana', off);
    if (btn) btn.textContent = off ? 'あ 假名:關' : 'あ 假名:開';
  }
  if (btn) btn.onclick = function(){
    localStorage.setItem(KEY, localStorage.getItem(KEY) === '1' ? '0' : '1');
    apply();
  };
  apply();
})();
</script>
</body>
</html>
