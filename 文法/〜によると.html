<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>〜によると</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site"><a href="../index.html">🏠 日文讀書會</a><button type="button" id="furi-toggle">あ 假名:開</button></header>
<main>
<h2>〜によると</h2>
<p><strong>接續</strong>:名詞 + によると</p>
<p><strong>意思</strong>:表示消息來源 →「根據〜」,句尾常搭配傳聞的 <a href="../文法/〜そうだ(傳聞).html">〜そうだ(傳聞)</a></p>
<h3>例句</h3>
<ul><li>天気予報<strong>によると</strong>、明日は雨だそうです。</li><li>会社<strong>によると</strong>、社員の8割が賛成した。</li></ul>
<h3>出現過的文章</h3>
<ul><li><a href="../教材/2026-07-13 桃の食べ放題イベント.html">2026-07-13 桃の食べ放題イベント</a></li><li><a href="../教材/2026-07-13 週休三日の会社.html">2026-07-13 週休三日の会社</a></li></ul>
<footer>更新:2026-07-20</footer>
</main>
<script>
(function(){
  var KEY = 'furigana-off';
  var btn = document.getElementById('furi-toggle');
  function apply(){
    var off = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('no-furigana', off);
    if (btn) btn.textContent = off ? 'あ 假名:關' : 'あ 假名:開';
  }
  if (btn) btn.onclick = function(){
    localStorage.setItem(KEY, localStorage.getItem(KEY) === '1' ? '0' : '1');
    apply();
  };
  apply();
})();
</script>
</body>
</html>
