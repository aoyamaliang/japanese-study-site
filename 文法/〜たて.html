<h2>〜たて</h2>
<p><strong>接續</strong>:動詞ます形語幹 + たて(+の+名詞)</p>
<p><strong>意思</strong>:「剛〜好的」,強調動作剛完成、最新鮮的狀態</p>
<h3>例句</h3>
<ul><li><strong>もぎたて</strong>の味を堪能していました。(盡情享受現摘的美味)</li><li><strong>焼きたて</strong>のパン(剛出爐的麵包)/<strong>炊きたて</strong>のご飯(剛煮好的飯)/<strong>できたて</strong>の料理</li></ul>
<h3>注意</h3>
<ul><li>只能用於「完成後狀態好、值得珍惜」的動作,多與食物相關</li><li>和「〜たばかり」的差異:たばかり只講時間近,たて強調新鮮價值感</li></ul>
