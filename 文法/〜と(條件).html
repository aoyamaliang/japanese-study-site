<h2>〜と(條件)</h2>
<p><strong>接續</strong>:動詞辭書形/ない形 + と</p>
<p><strong>意思</strong>:「一〜就〜」,表示前項成立後,後項必然/自動發生</p>
<h3>例句</h3>
<ul><li>食べ放題が始まる<strong>と</strong>、参加者は桃をざるですくい上げました。</li><li>春になる<strong>と</strong>、桜が咲きます。(一到春天櫻花就開)</li></ul>
<h3>注意</h3>
<ul><li>後句<strong>不能</strong>接意志、命令、請求:✗「雨が降ると、家にいてください」→ 要用「たら」</li><li>四種條件「と/ば/たら/なら」的區別是 N3 大魔王,先記住:と=自然規律、必然結果</li></ul>
