<h2>〜から〜まで</h2>
<p><strong>接續</strong>:名詞 + から + 名詞 + まで</p>
<p><strong>意思</strong>:時間或空間的範圍 →「從〜到〜」</p>
<h3>例句</h3>
<ul><li>月曜日<strong>から</strong>木曜日<strong>まで</strong>働きます。</li><li>家<strong>から</strong>駅<strong>まで</strong>歩きます。</li></ul>
