<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>〜余り</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site"><a href="../index.html">🏠 日文讀書會</a><button type="button" id="furi-toggle">あ 假名:開</button></header>
<main>
<h2>〜余り(あまり)</h2>
<p><strong>接續</strong>:數量詞 + 余り</p>
<p><strong>意思</strong>:「〜多、〜有餘」,表示略超過該數量</p>
<h3>例句</h3>
<ul><li>桃は５０００個<strong>余り</strong>が用意される。(準備了5000多顆桃子)</li><li>１０年<strong>余り</strong>日本に住んでいます。(在日本住了十多年)</li></ul>
<h3>注意</h3>
<ul><li>新聞書面語,口語多用「〜以上」或「〜ちょっと」</li><li>別和「あまり〜ない」(不太〜)搞混,完全不同的字</li></ul>
<h3>出現過的文章</h3>
<ul><li><a href="../教材/2026-07-13 桃の食べ放題イベント.html">2026-07-13 桃の食べ放題イベント</a></li></ul>
<footer>更新:2026-07-20</footer>
</main>
<script>
(function(){
  var KEY = 'furigana-off';
  var btn = document.getElementById('furi-toggle');
  function apply(){
    var off = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('no-furigana', off);
    if (btn) btn.textContent = off ? 'あ 假名:關' : 'あ 假名:開';
  }
  if (btn) btn.onclick = function(){
    localStorage.setItem(KEY, localStorage.getItem(KEY) === '1' ? '0' : '1');
    apply();
  };
  apply();
})();
</script>
</body>
</html>
