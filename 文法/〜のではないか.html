<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>〜のではないか</title>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<header class="site"><a href="../index.html">🏠 日文讀書會</a><button type="button" id="furi-toggle">あ 假名:開</button></header>
<main>
<h2>〜のではないか</h2>
<p><strong>接續</strong>:普通形 + のではないか(口語:〜んじゃないか)</p>
<p><strong>意思</strong>:帶著擔心或委婉語氣的推測 →「該不會〜吧」「是不是〜呢」</p>
<h3>例句</h3>
<ul><li>給料が下がる<strong>のではないか</strong>と心配する人もいます。</li><li>この計画は無理な<strong>のではないか</strong>と思います。(我覺得這個計畫是不是行不通呢)</li></ul>
<h3>注意</h3>
<ul><li>比直接說「〜と思う」更委婉,商務日語常用</li><li>口語縮約「〜んじゃない?」語氣更輕</li></ul>
<h3>出現過的文章</h3>
<ul><li><a href="../教材/2026-07-13 週休三日の会社.html">2026-07-13 週休三日の会社</a></li></ul>
<footer>更新:2026-07-20</footer>
</main>
<script>
(function(){
  var KEY = 'furigana-off';
  var btn = document.getElementById('furi-toggle');
  function apply(){
    var off = localStorage.getItem(KEY) === '1';
    document.body.classList.toggle('no-furigana', off);
    if (btn) btn.textContent = off ? 'あ 假名:關' : 'あ 假名:開';
  }
  if (btn) btn.onclick = function(){
    localStorage.setItem(KEY, localStorage.getItem(KEY) === '1' ? '0' : '1');
    apply();
  };
  apply();
})();
</script>
</body>
</html>
