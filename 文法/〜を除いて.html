<h2>〜を除いて(をのぞいて)</h2>
<p><strong>接續</strong>:名詞 + を除いて</p>
<p><strong>意思</strong>:「除了〜之外」,把某項排除在範圍外</p>
<h3>例句</h3>
<ul><li>土曜日と日曜日<strong>を除いて</strong>行われます。(週六週日除外照常舉行)</li><li>一部の商品<strong>を除いて</strong>、すべて半額です。</li></ul>
<h3>注意</h3>
<ul><li>書面語;口語常說「〜以外(いがい)」</li><li>「〜を除き」是更硬的書面形,公告、規章常見</li></ul>
